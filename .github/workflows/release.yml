name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
          - os: ubuntu-latest
            name: linux
          - os: windows-latest
            name: windows
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux tray dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        run: |
          ./build-macos.sh
          ditto -c -k --keepParent ClaudeUsageBar.app claude-usage-bar-macos.zip

      - name: Build Linux binary
        if: runner.os == 'Linux'
        run: |
          cargo build --release
          tar -czf claude-usage-bar-linux.tar.gz -C target/release claude-usage-bar

      - name: Build Windows binary
        if: runner.os == 'Windows'
        run: |
          cargo build --release
          Compress-Archive -Path target/release/claude-usage-bar.exe -DestinationPath claude-usage-bar-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            claude-usage-bar-macos.zip
            claude-usage-bar-linux.tar.gz
            claude-usage-bar-windows.zip
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
